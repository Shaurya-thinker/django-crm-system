{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-3">
                    Forgot Password
                </h2>

                <p class="text-muted">

                    Enter your registered email address.

                    If an account exists with that email,
                    a password reset link will be sent.

                </p>

                <form method="POST">

                    {% csrf_token %}

                    {% for field in form %}

                        <div class="mb-3">

                            <label class="form-label">

                                {{ field.label }}

                            </label>

                            {{ field }}

                        </div>

                    {% endfor %}

                    <button
                        type="submit"
                        class="btn btn-primary"
                    >
                        Send Reset Link
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
