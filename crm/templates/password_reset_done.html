{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-sm">

            <div class="card-body text-center p-5">

                <h1 class="text-success">
                    Password Reset Email Sent
                </h1>

                <p class="mt-4">
                    If an account exists with the email address
                    you entered, a password reset link has been sent.
                </p>

                <p class="text-muted">
                    Please check your inbox and spam folder.
                </p>

                <div class="mt-4">

                    <span id="countdown-text">
                        Didn't receive it?
                        Resend in
                        <span id="countdown">
                            60
                        </span>s
                    </span>

                    <a
                        href="{% url 'password_reset' %}"
                        id="resend-link"
                        class="btn btn-outline-primary"
                        style="display:none;"
                    >
                        Resend Email
                    </a>

                </div>

                <div class="mt-4">

                    <a
                        href="{% url 'login' %}"
                        class="btn btn-primary"
                    >
                        Back to Login
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

let seconds = Number('{{ remaining_seconds }}');

const countdown =
    document.getElementById(
        'countdown'
    );

const countdownText =
    document.getElementById(
        'countdown-text'
    );

const resendLink =
    document.getElementById(
        'resend-link'
    );

const timer = setInterval(
    function(){

        seconds--;

        countdown.innerText =
            seconds;

        if(seconds <= 0){

            clearInterval(timer);

            countdownText.style.display =
                'none';

            resendLink.style.display =
                'inline-block';
        }

    },
    1000
);

</script>

{% endblock %}
