{% extends 'base.html' %}

{% block content %}

<h1>Delete Employee</h1>

<p>

    Are you sure you want to delete

    <strong>
        {{ employee.user.username }}
    </strong>

    ?

</p>

<form method="POST">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger"
    >
        Confirm Delete
    </button>

</form>

{% endblock %}
