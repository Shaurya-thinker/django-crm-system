{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm">

            <div class="card-body">

                <h2 class="mb-4">
                    Set New Password
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {% for field in form %}

                        <div class="mb-3">

                            <label class="form-label">

                                {{ field.label }}

                            </label>

                            {{ field }}

                            {% if field.help_text %}
                                <small class="text-muted d-block">
                                    {{ field.help_text|safe }}
                                </small>
                            {% endif %}

                            {% if field.errors %}
                                <div class="text-danger">
                                    {{ field.errors }}
                                </div>
                            {% endif %}

                        </div>

                    {% endfor %}

                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        Reset Password
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
