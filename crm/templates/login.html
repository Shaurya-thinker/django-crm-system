{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">

```
<div class="col-md-5">

    <div class="card shadow border-0">

        <div class="card-body p-4">

            <div class="text-center mb-4">

                <h2 class="fw-bold">
                    Welcome Back
                </h2>

                <p class="text-muted">
                    Sign in to continue to CRM System
                </p>

            </div>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        placeholder="Enter username"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <div class="input-group">

                        <input
                            type="password"
                            name="password"
                            id="password"
                            class="form-control"
                            placeholder="Enter password"
                            required
                        >

                        <button
                            type="button"
                            class="btn btn-outline-secondary"
                            onclick="togglePassword()"
                        >
                            👁
                        </button>

                    </div>

                </div>

                <div class="d-flex justify-content-between mb-3">

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="remember"
                        >

                        <label
                            class="form-check-label"
                            for="remember"
                        >
                            Remember Me
                        </label>

                    </div>

                    <a href="{% url 'password_reset' %}">
                        Forgot Password?
                    </a>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100"
                >
                    Login
                </button>

            </form>

        </div>

    </div>

</div>
```

</div>

<script>

function togglePassword() {

    const passwordField =
        document.getElementById('password');

    passwordField.type =
        passwordField.type === 'password'
        ? 'text'
        : 'password';
}

</script>

{% endblock %}
